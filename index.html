<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeoStock - Simple Inventory Management</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <i data-lucide="layout-dashboard"></i>
            <span>HomeoStock</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <a class="nav-link active" onclick="app.navigate('dashboard')">
                    <i data-lucide="home"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="app.navigate('inventory')">
                    <i data-lucide="package"></i>
                    <span>Inventory</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="app.navigate('deliveries')">
                    <i data-lucide="truck"></i>
                    <span>Deliveries</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="app.navigate('settings')">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="main-wrapper">
        <header class="header">
            <h2 id="page-title">Dashboard Overview</h2>
            <div class="header-actions">
                <input type="text" class="search-bar" placeholder="Search medicines or orders...">
            </div>
        </header>

        <main class="content-area" id="main-content">
            <!-- Dynamic content will be injected here -->
        </main>
    </div>

    <!-- Application Scripts -->
    <script src="js/data.js"></script>
    <script src="js/components/dashboard.js"></script>
    <script src="js/components/inventory.js"></script>
    <script src="js/components/deliveries.js"></script>
    <script src="js/components/employees.js"></script>
    <script src="js/components/settings.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Initialize icons
        lucide.createIcons();
    </script>
</body>
</html>
