name: Database Backup to Google Drive

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create Backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is missing! Please add it in Settings > Secrets."
            exit 1
          fi
          
          # Debug: Check URL prefix (masked)
          echo "Connecting to: ${DATABASE_URL:0:15}..."
          
          FILENAME="backup-$(date +'%Y-%m-%d-%H%M%S').sql"
          
          # Use more robust flags for cloud databases
          pg_dump "$DATABASE_URL" --no-owner --no-privileges > "$FILENAME"
          
          if [ -f "$FILENAME" ] && [ -s "$FILENAME" ]; then
            echo "Backup created successfully: $FILENAME"
            echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          else
            echo "::error::Backup file was not created or is empty!"
            exit 1
          fi

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          filename: ${{ env.FILENAME }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: false
