name: Database Backup to Google Drive

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 Client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/pgdg.asc &>/dev/null
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create Backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is missing! Please add it in Settings > Secrets."
            exit 1
          fi
          
          # Debug: Verify version
          /usr/lib/postgresql/17/bin/pg_dump --version
          
          FILENAME="backup-$(date +'%Y-%m-%d-%H%M%S').sql"
          
          # Use absolute path to ensure v17 is used
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" --no-owner --no-privileges > "$FILENAME"
          
          if [ -f "$FILENAME" ] && [ -s "$FILENAME" ]; then
            echo "Backup created successfully: $FILENAME"
            echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          else
            echo "::error::Backup file was not created or is empty!"
            exit 1
          fi

      - name: Prepare Google Drive Credentials
        id: encode_creds
        env:
          GDRIVE_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$GDRIVE_KEY" ]; then
            echo "::error::GDRIVE_SERVICE_ACCOUNT_KEY secret is missing!"
            exit 1
          fi
          # Convert the raw JSON to a base64 string
          B64_CREDS=$(printf "%s" "$GDRIVE_KEY" | base64 | tr -d '\n')
          echo "::add-mask::$B64_CREDS"
          echo "b64_creds=$B64_CREDS" >> $GITHUB_OUTPUT

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ steps.encode_creds.outputs.b64_creds }}
          filename: ${{ env.FILENAME }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: false
