name: Database Backup to Google Drive

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create Backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Error: DATABASE_URL secret is not set."
            exit 1
          fi
          FILENAME="backup-$(date +'%Y-%m-%d-%H%M%S').sql"
          pg_dump "$DATABASE_URL" > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          filename: ${{ env.FILENAME }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          overwrite: false
